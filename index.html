<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>59RK/59RS · Harita</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg:      #0d1117; --surface: #161b22; --border: #30363d;
      --accent:  #4fc3f7; --red:     #e94560; --yellow: #f0b429;
      --green:   #3fb950; --text:    #e6edf3; --dim:    #8b949e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; flex-direction: column; height: 100dvh;
           font-family: monospace; background: var(--bg); color: var(--text); }

    /* ── Nav ── */
    nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    nav a { flex: 1; text-align: center; padding: 10px 4px; color: var(--dim);
            text-decoration: none; font-size: 13px; border-bottom: 2px solid transparent; }
    nav a.active { color: var(--accent); border-bottom-color: var(--accent); }
    nav a:hover  { color: var(--text); }

    /* ── Map ── */
    #map  { flex: 1; position: relative; min-height: 0; }
    #waiting { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
               background: rgba(22,33,62,0.93); padding: 24px 36px; border-radius: 10px;
               border: 1px solid var(--border); text-align: center; z-index: 1000;
               font-size: 15px; pointer-events: none; }
    #waiting b { color: var(--accent); }

    /* ── Bottom bar ── */
    #bar  { display: flex; align-items: center; gap: 8px; padding: 8px 12px;
            background: var(--surface); border-top: 1px solid var(--border); flex-wrap: wrap; flex-shrink: 0; }
    .chip { background: #0f3460; padding: 4px 10px; border-radius: 4px; font-size: 12px; white-space: nowrap; }
    .val  { color: var(--accent); font-weight: bold; }
    .red  { color: var(--red);    font-weight: bold; }
    .btn  { background: #0f3460; border: 1px solid var(--accent); color: var(--accent);
            padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; font-family: monospace; }
    .btn:active { background: #1a4a6e; }

    /* ── Log panel ── */
    #logpanel { display: none; background: var(--surface); border-top: 1px solid var(--border);
                max-height: 200px; overflow-y: auto; padding: 6px 12px; flex-shrink: 0; }
    #logpanel .lrow { font-size: 12px; padding: 2px 0; border-bottom: 1px solid #30363d44; }
    #logpanel .ts  { color: var(--accent); margin-right: 8px; }
    #logpanel .ev  { color: var(--red);    margin-right: 6px; }

    /* ── Config modal ── */
    #cfgmodal { display: none; position: absolute; top: 50%; left: 50%;
                transform: translate(-50%,-50%); background: var(--surface);
                border: 1px solid var(--accent); border-radius: 10px;
                padding: 20px 24px; z-index: 2000; min-width: 260px; max-width: 90vw; }
    #cfgmodal h3   { color: var(--accent); margin-bottom: 14px; font-size: 14px; }
    #cfgmodal label { display: block; font-size: 12px; color: var(--dim); margin-bottom: 4px; }
    #cfgmodal input { width: 100%; background: #0f3460; border: 1px solid var(--accent);
                      color: var(--text); padding: 5px 8px; border-radius: 4px;
                      font-family: monospace; margin-bottom: 12px; }
    #cfgmodal .row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    #cfgsave   { background: var(--accent); color: #1a1a2e; border: none;
                 padding: 6px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    #cfgcancel { background: none; border: 1px solid var(--dim); color: var(--dim);
                 padding: 6px 14px; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
<nav>
  <a href="/"        class="active">🗺 Harita</a>
  <a href="/display"           >🚏 Durak</a>
  <a href="/logs-page"         >📋 Log</a>
</nav>

<div id="map">
  <div id="waiting">
    <div>⏳ Hayalet filtresi aktif — bekleniyor...</div>
    <div style="margin-top:8px;color:var(--dim);font-size:12px">
      Araçlar <b id="poll-cdwn">~8 dakika</b> sonra görünecek
    </div>
  </div>
  <div id="cfgmodal">
    <h3>⚙ Hayalet Filtresi Ayarları</h3>
    <label>Minimum poll sayısı (MIN_POLLS)</label>
    <input id="inp-polls" type="number" min="1" max="20" step="1"/>
    <label>Minimum hareket mesafesi — km (MIN_MOVE_KM)</label>
    <input id="inp-move" type="number" min="0.001" max="1" step="0.001"/>
    <div id="cfgmsg" style="font-size:12px;color:var(--accent);min-height:18px;margin-bottom:6px"></div>
    <div class="row">
      <button id="cfgcancel" onclick="closeCfg()">İptal</button>
      <button id="cfgsave"   onclick="saveConfig()">Kaydet</button>
    </div>
  </div>
</div>

<div id="logpanel"></div>
<div id="bar">
  <span class="chip">Hat: <span class="red">59RK / 59RS</span></span>
  <span class="chip">→ <span class="red">4. Levent</span></span>
  <span class="chip">Aktif: <span class="val" id="cnt">—</span></span>
  <span class="chip">Güncelleme: <span class="val" id="upd">—</span></span>
  <span class="chip">Sonraki: <span class="val" id="cdwn">—</span></span>
  <button class="btn" onclick="toggleLogs()">📋 Loglar</button>
  <button class="btn" onclick="openCfg()">⚙ Ayar</button>
</div>

<script>
let nextAt = Date.now(), logsOpen = false;
let busMarkers = {}, destMarker = null, passedRect = null, pollsDone = 0;

const map = L.map('map').setView([41.09, 28.99], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);

const busIcons = {
  "59RK": L.divIcon({ html: '<span style="font-size:26px">🚌</span>', iconSize:[32,32], iconAnchor:[16,16], className:'' }),
  "59RS": L.divIcon({ html: '<span style="font-size:26px">🚎</span>', iconSize:[32,32], iconAnchor:[16,16], className:'' }),
};
const destIcon = L.divIcon({ html: '<span style="font-size:26px">📍</span>', iconSize:[32,32], iconAnchor:[16,30], className:'' });
function getBusIcon(b) { return busIcons[b.hat_no] || busIcons["59RK"]; }

function gpsColor(age) {
  if (age === null || age === undefined) return '#8b949e';
  if (age < 120) return '#3fb950';
  if (age < 300) return '#f0b429';
  return '#e94560';
}

function popup(b) {
  const age = b.gps_age_secs;
  const ageStr = age == null ? '?' : age < 60 ? `${age}s` : `${Math.floor(age/60)}dk ${age%60}s`;
  const ageColor = gpsColor(age);
  return `
<div style="font-family:monospace;font-size:13px;line-height:1.8;min-width:220px">
  <b style="font-size:15px">${b.kapino}</b>
  <span style="color:#e94560;margin-left:6px">[${b.hat_no||'?'}]</span>
  <hr style="border-color:#30363d;margin:6px 0"/>
  <table style="width:100%;border-collapse:collapse">
    <tr><td style="color:#8b949e;padding-right:10px">Mesafe</td>   <td><b>${b.dist_km} km</b></td></tr>
    <tr><td style="color:#8b949e">ETA</td>        <td><b style="color:#4fc3f7">${b.eta || '—'}</b></td></tr>
    <tr><td style="color:#8b949e">Hız</td>        <td>${parseFloat(b.hiz||0).toFixed(0)} km/h</td></tr>
    <tr><td style="color:#8b949e">Yön</td>        <td style="font-size:11px">${b.yon||'—'}</td></tr>
    <tr><td style="color:#8b949e">Güzergah</td>   <td style="font-size:11px">${b.guzergahkodu||'—'}</td></tr>
    <tr><td style="color:#8b949e">Yakın durak</td><td style="font-size:11px">${b.yakinDurakKodu||'—'}</td></tr>
    <tr><td style="color:#8b949e">GPS yaşı</td>   <td style="color:${ageColor}">${ageStr}</td></tr>
    <tr><td style="color:#8b949e">Son konum</td>  <td style="font-size:11px">${b.son_konum_zamani||'—'}</td></tr>
  </table>
</div>`;
}

async function update() {
  try {
    const r = await fetch('/buses'), data = await r.json();
    pollsDone++;
    nextAt = Date.now() + (data.next_update_secs || 120) * 1000;

    const counts = {};
    for (const b of data.buses) counts[b.hat_no] = (counts[b.hat_no]||0)+1;
    const cntText = Object.entries(counts).map(([k,v])=>`${k}:${v}`).join(' / ') || '0';
    document.getElementById('cnt').textContent = cntText;
    document.getElementById('upd').textContent = data.last_update || '—';

    if (data.buses.length > 0) {
      const w = document.getElementById('waiting');
      if (w) w.style.display = 'none';
    } else {
      const rem = Math.max(0, 4 - pollsDone);
      const el = document.getElementById('poll-cdwn');
      if (el) el.textContent = rem > 0 ? `~${rem * 2} dakika` : 'az kaldı';
    }

    if (!destMarker) {
      destMarker = L.marker([data.dest_lat, data.dest_lon], {icon: destIcon})
        .bindPopup('<b>4. Levent</b>').addTo(map);
    }
    if (!passedRect && data.passed_box) {
      const [latMin, latMax, lonMin, lonMax] = data.passed_box;
      passedRect = L.rectangle([[latMin, lonMin], [latMax, lonMax]], {
        color: '#e94560', weight: 1.5, dashArray: '6 4',
        fillColor: '#e94560', fillOpacity: 0.07,
      }).bindTooltip('Geçti bölgesi').addTo(map);
    }

    const live = new Set(data.buses.map(b => b.kapino));
    for (const id in busMarkers) {
      if (!live.has(id)) { map.removeLayer(busMarkers[id]); delete busMarkers[id]; }
    }
    for (const b of data.buses) {
      const lat = parseFloat(b.enlem), lon = parseFloat(b.boylam);
      if (!lat || !lon) continue;
      if (busMarkers[b.kapino]) {
        busMarkers[b.kapino].setLatLng([lat, lon]).setPopupContent(popup(b));
      } else {
        busMarkers[b.kapino] = L.marker([lat, lon], {icon: getBusIcon(b)})
          .bindPopup(popup(b)).addTo(map);
      }
    }
    if (logsOpen) await refreshLogs();
  } catch(e) { console.error(e); }
}

// ── Log panel ──────────────────────────────────────────────────────────────
const EV_ICONS = {
  startup:'▶', shutdown:'■', poll:'·', ghost_filtered:'☠',
  bus_passed:'✓', api_empty:'?', api_retry:'↻', api_fail:'✗',
  stale_gps:'⚠', gmaps_error:'!', config_changed:'⚙', cooldown_expired:'⌛'
};
async function refreshLogs() {
  try {
    const r = await fetch('/logs?n=40'), data = await r.json();
    document.getElementById('logpanel').innerHTML = data.events.slice().reverse().map(e => {
      const icon = EV_ICONS[e.event] || '·';
      const ts   = (e.ts||'').slice(11,19);
      const extra = e.kapino ? ` ${e.kapino}` : (e.error ? ` ${e.error}` : '');
      return `<div class="lrow"><span class="ts">${ts}</span><span class="ev">${icon} ${e.event}</span>${extra}</div>`;
    }).join('');
  } catch(e) {}
}
async function toggleLogs() {
  const panel = document.getElementById('logpanel');
  logsOpen = !logsOpen;
  panel.style.display = logsOpen ? 'block' : 'none';
  if (logsOpen) await refreshLogs();
}

// ── Config modal ───────────────────────────────────────────────────────────
async function openCfg() {
  const r = await fetch('/config'), cfg = await r.json();
  document.getElementById('inp-polls').value = cfg.min_polls;
  document.getElementById('inp-move').value  = cfg.min_move_km;
  document.getElementById('cfgmsg').textContent = '';
  document.getElementById('cfgmodal').style.display = 'block';
}
function closeCfg() { document.getElementById('cfgmodal').style.display = 'none'; }
async function saveConfig() {
  const payload = {
    min_polls:   parseInt(document.getElementById('inp-polls').value),
    min_move_km: parseFloat(document.getElementById('inp-move').value),
  };
  try {
    const r = await fetch('/config', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
    const data = await r.json();
    if (data.ok) { document.getElementById('cfgmsg').textContent = '✓ Kaydedildi'; setTimeout(closeCfg, 800); }
    else document.getElementById('cfgmsg').textContent = '✗ ' + (data.error||'?');
  } catch(e) { document.getElementById('cfgmsg').textContent = '✗ ' + e; }
}

// ── Countdown + auto-refresh ───────────────────────────────────────────────
setInterval(() => {
  const s = Math.max(0, Math.round((nextAt - Date.now()) / 1000));
  document.getElementById('cdwn').textContent = `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}, 1000);

setInterval(update, 120_000);
update();

// ── Screen Wake Lock ───────────────────────────────────────────────────────
let wakeLock = null;

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch (err) {}
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

requestWakeLock();
</script>
</body>
</html>
